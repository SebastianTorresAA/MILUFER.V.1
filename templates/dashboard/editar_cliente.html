{% extends "dashboard/dashboard.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/dashboard/editar_cliente.css' %}">
{% endblock %}

{% block dashboard_content %}

<div class="editar-cliente-contenedor">

    <h1>Editar Cliente</h1>

    <form method="post" class="formulario-editar-cliente">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="botones-formulario">
            <button type="submit" class="boton-guardar">Guardar cambios</button>
            <a href="{% url 'dashboard:clientes' %}" class="boton-cancelar">Cancelar</a>
        </div>
    </form>

</div>

{% endblock %}
