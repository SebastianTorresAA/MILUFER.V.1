{% extends 'base.html' %}
{% load static %}

{% block content %}

    <link rel="stylesheet" href="{% static 'css/registro.css' %}">



    <!-- ============================================= -->
    <!--           PÁGINA DE REGISTRO                 -->
    <!-- ============================================= -->
    <div class="contenedor-registro">

        <!-- Título principal -->
        <h1>Crear Cuenta</h1>
        <p>Regístrate en Milufer y descubre nuestras joyas y accesorios</p>

        <!-- Formulario de registro -->
        <form method="post" class="formulario-registro">

            {% csrf_token %}

            <!-- Campo: Nombre de usuario -->
            <div class="campo">
                <label for="username">Nombre de usuario</label>
                <input type="text" 
                       name="username" 
                       id="username" 
                       placeholder="Elige un nombre de usuario" 
                       required>
            </div>

            <!-- Campo: Nombres -->
            <div class="campo">
                <label for="first_name">Nombres</label>
                <input type="text" 
                       name="first_name" 
                       id="first_name" 
                       placeholder="Tus nombres" 
                       required>
            </div>

             <!-- Campo: Apellidos -->
            <div class="campo">
                <label for="last_name">Apellidos</label>
                <input type="text" 
                       name="last_name" 
                       id="last_name" 
                       placeholder="Tus apellidos" 
                       required>
            </div>


            <!-- Campo: Correo electrónico -->
            <div class="campo">
                <label for="email">Correo electrónico</label>
                <input type="email" 
                       name="email" 
                       id="email" 
                       placeholder="tu@email.com" 
                       required>
            </div>

            <!-- Campo: Contraseña -->
            <div class="campo">
                <label for="password1">Contraseña</label>
                <input type="password" 
                       name="password1" 
                       id="password1" 
                       placeholder="Crea una contraseña segura" 
                       required>
            </div>

            <!-- Campo: Confirmar contraseña -->
            <div class="campo">
                <label for="password2">Confirmar contraseña</label>
                <input type="password" 
                       name="password2" 
                       id="password2" 
                       placeholder="Repite la contraseña" 
                       required>
            </div>

            <!-- Botón de registro -->
            <button type="submit" class="boton-registro">
                Registrarse
            </button>

        </form>

        <!-- Enlace a la página de inicio de sesión -->
        <div class="opcion-login">
            <p>¿Ya tienes cuenta?</p>
            <a href="{% url 'usuarios:login' %}" class="enlace-login">
                Iniciar sesión
            </a>
        </div>

    </div>

{% endblock %}
