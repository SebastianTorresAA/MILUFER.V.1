{% extends 'base.html' %}
{% load static %}

{% block content %}

    <link rel="stylesheet" href="{% static 'css/producto.css' %}">

    <!-- ============================================= -->
    <!--           DETALLE DEL PRODUCTO               -->
    <!-- ============================================= -->
    <div class="detalle-producto">

        <!-- Columna izquierda: imagen grande -->
        <div class="columna-imagen">
            <img src="{{ producto.imagen.url }}" 
                 alt="{{ producto.nombre }}"
                 class="imagen-principal">
        </div>

        <!-- Columna derecha: información -->
        <div class="columna-info">

            <!-- Nombre del producto -->
            <h1>{{ producto.nombre }}</h1>

            <!-- Precio destacado -->
            <div class="precio">
                {{ producto.precio }} COP
            </div>

            <!-- Descripción -->
            <div class="descripcion">
                <h3>Descripción</h3>
                <p>{{ producto.descripcion }}</p>
            </div>

            <!-- Formulario para agregar al carrito -->
                        <form method="post" action="{% url 'ventas:agregar_carrito' producto.id %}">
                            {% csrf_token %}
                        <label for="cantidad_{{ producto.id }}">Cantidad:</label>
                        <input type="number" 
                        name="cantidad" 
                        id="cantidad_{{ producto.id }}" 
                        min="1" 
                        max="{{ producto.stock }}" 
                        value="1" 
                        required>
                        <button type="submit" class="boton-agregar">Agregar al carrito</button>
                    </form>

            <!-- Botón de agregar al carrito -->
           <div class="acciones">
            <a href="{% url 'ventas:agregar_carrito' producto.id %}" class="boton-agregar">
                Agregar al carrito
             </a>
           </div>


        </div>

    </div>

{% endblock %}
