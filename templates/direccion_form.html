{% extends 'base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/direccion_form.css' %}">

<!-- ============================================= -->
<!--           FORMULARIO AGREGAR DIRECCIÓN       -->
<!-- ============================================= -->
<div class="contenedor-perfil">

    <h1>Agregar Nueva Dirección</h1>
    <p>Completa los campos para agregar una dirección de envío</p>

    <form method="post" class="formulario-registro">
        {% csrf_token %}

        <div class="campo">
            <label for="direccion">Dirección</label>
            <input type="text"
                   name="direccion"
                   id="direccion"
                   placeholder="Calle, número, colonia"
                   required>
        </div>

        <div class="campo">
            <label for="ciudad">Ciudad</label>
            <input type="text"
                   name="ciudad"
                   id="ciudad"
                   placeholder="Ciudad"
                   required>
        </div>

        <div class="campo">
            <label for="referencia">Referencia (opcional)</label>
            <input type="text"
                   name="referencia"
                   id="referencia"
                   placeholder="Ej: cerca de la tienda X"
                   >
        </div>

        <div class="campo">
            <label for="principal">Establecer como predeterminada</label>
            <input type="checkbox"
                   name="principal"
                   id="principal">
        </div>

        <button type="submit" class="boton-registro">
            Guardar Dirección
        </button>
    </form>

    <div class="opcion-login">
        <a href="{% url 'usuarios:perfil' %}" class="enlace-login">
            ← Volver a mi perfil
        </a>
    </div>

</div>

{% endblock %}
